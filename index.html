<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master of the Ages — A Historical 4X Strategy Game</title>
    <meta name="description" content="A historical 4X for players who want strategy without busywork. Coming soon to Steam.">

    <!-- Open Graph (Discord, Twitter, link previews) -->
    <meta property="og:title" content="Master of the Ages">
    <meta property="og:description" content="A historical 4X for players who want strategy without busywork.">
    <meta property="og:image" content="https://masteroftheages.com/hero.webp">
    <meta property="og:url" content="https://masteroftheages.com">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Cinzel for headings, matches the historical capsule typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a1628;
            --bg-soft: #11203a;
            --text: #e8dec9;
            --text-muted: #8a9bb4;
            --gold: #d4a85a;
            --gold-bright: #e8c378;
            --steam-blue: #1b2838;
            --steam-blue-bright: #2a475e;
            --border: rgba(212, 168, 90, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        body {
            background:
                radial-gradient(ellipse at top, rgba(212, 168, 90, 0.06), transparent 60%),
                var(--bg);
            background-attachment: fixed;
        }

        main {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 24px 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        /* Hero capsule */
        .hero {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 6px;
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.5),
                0 0 0 1px var(--border);
            aspect-ratio: 1536 / 720;
            object-fit: cover;
        }

        .tagline {
            font-family: "Cinzel", Georgia, serif;
            font-weight: 500;
            font-size: clamp(1rem, 1.2vw + 0.6rem, 1.35rem);
            color: var(--text);
            text-align: center;
            letter-spacing: 0.02em;
            max-width: 720px;
        }

        /* Steam CTA — the headline action */
        .cta-steam {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(to bottom, var(--steam-blue-bright), var(--steam-blue));
            color: #ffffff;
            text-decoration: none;
            font-family: "Cinzel", Georgia, serif;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 16px 32px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow:
                0 6px 20px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }

        .cta-steam:hover {
            background: linear-gradient(to bottom, #355b7c, #243a52);
            transform: translateY(-1px);
            box-shadow:
                0 8px 24px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .cta-steam:active {
            transform: translateY(0);
        }

        .cta-steam svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* Section dividers */
        .divider {
            width: 80px;
            height: 1px;
            background: var(--border);
            margin: 8px 0;
        }

        /* Mailing list section */
        .mailing-list {
            width: 100%;
            max-width: 560px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .mailing-list h2 {
            font-family: "Cinzel", Georgia, serif;
            font-weight: 600;
            font-size: 1.25rem;
            color: var(--gold);
            letter-spacing: 0.04em;
        }

        .mailing-list p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .kit-wrapper {
            width: 100%;
            margin-top: 8px;
        }

        /* Kit applies a max-width to the form by default, which squeezes the fields
           and causes them to wrap. Force it to fill our container. */
        .kit-wrapper form,
        .kit-wrapper .formkit-form,
        .kit-wrapper [data-uid] {
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 !important;
        }

        /* The fields container holds both the input wrapper and the submit button as
           direct children. Force horizontal layout. */
        .kit-wrapper [data-element="fields"],
        .kit-wrapper .seva-fields,
        .kit-wrapper .formkit-fields {
            display: flex !important;
            flex-direction: row !important;
            flex-wrap: nowrap !important;
            gap: 8px !important;
            width: 100% !important;
            align-items: stretch !important;
        }

        /* The div wrapping the input — let it grow */
        .kit-wrapper .formkit-field {
            flex: 1 1 auto !important;
            min-width: 0 !important;
        }

        /* Input fills its wrapper */
        .kit-wrapper .formkit-input,
        .kit-wrapper input[name="email_address"] {
            width: 100% !important;
            box-sizing: border-box !important;
        }

        /* Submit button hugs its content */
        .kit-wrapper .formkit-submit,
        .kit-wrapper [data-element="submit"] {
            flex: 0 0 auto !important;
            white-space: nowrap !important;
        }

        /* Stack vertically on narrow screens */
        @media (max-width: 520px) {
            .kit-wrapper [data-element="fields"],
            .kit-wrapper .seva-fields,
            .kit-wrapper .formkit-fields {
                flex-direction: column !important;
            }
        }

        /* Discord link */
        .community {
            margin-top: 8px;
        }

        .community a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: color 0.15s ease, border-color 0.15s ease;
        }

        .community a:hover {
            color: var(--gold-bright);
            border-color: var(--gold);
        }

        .community svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Footer */
        footer {
            margin-top: 32px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        footer .studio {
            font-family: "Cinzel", Georgia, serif;
            color: var(--text);
            font-size: 0.95rem;
        }

        /* Tighter mobile */
        @media (max-width: 600px) {
            main {
                padding: 16px 16px 48px;
                gap: 20px;
            }

            .cta-steam {
                font-size: 0.95rem;
                padding: 14px 24px;
            }
        }
    </style>
</head>
<body>
    <main>
        <img
            src="hero.webp"
            alt="Master of the Ages — a historical 4X strategy game"
            class="hero"
            width="1536"
            height="720"
            fetchpriority="high">

        <p class="tagline">A historical 4X for players who want strategy without busywork.</p>

        <a href="https://store.steampowered.com/app/4772190/Master_of_the_Ages_Foundations_of_History/" class="cta-steam" target="_blank" rel="noopener" aria-label="Wishlist Master of the Ages on Steam">

            </svg>
            Wishlist on Steam
        </a>

        <div class="divider"></div>

        <section class="mailing-list">
            <h2>Development Updates</h2>
            <p>Get an occasional note about new features, art reveals, and the path to release.</p>
            <div class="kit-wrapper">
                <script async data-uid="f068e6677b" src="https://master-of-the-ages.kit.com/f068e6677b/index.js"></script>
            </div>
        </section>

        <div class="community">
            <a href="https://discord.gg/uJd7rrVNv9" target="_blank" rel="noopener" aria-label="Join the Master of the Ages Discord">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M20.317 4.37a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                </svg>
                Join the Discord
            </a>
        </div>

        <footer>
            <p class="studio">Sovereign Era Games™</p>
        </footer>
    </main>
</body>
</html>
